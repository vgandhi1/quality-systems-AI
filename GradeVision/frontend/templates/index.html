<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GradeVision</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 3rem; text-align: center; border-bottom: 1px solid #334155; }
    header h1 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 0.5rem; }
    header p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; }
    .container { max-width: 1000px; margin: 2rem auto; padding: 0 2rem; }
    .cta-buttons { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .btn { padding: 1rem 2.5rem; font-size: 1.05rem; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; }
    .btn-primary { background: linear-gradient(135deg, #0284c7, #0369a1); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(2, 132, 199, 0.4); }
    .btn-secondary { background: #1e293b; color: #38bdf8; border: 2px solid #38bdf8; }
    .btn-secondary:hover { background: #334155; }
    footer { text-align: center; color: #64748b; padding: 2rem; margin-top: 4rem; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 GradeVision</h1>
    <p>AI-Powered Return Merchandise Inspection</p>
  </header>

  <div class="container">
    <div class="cta-buttons">
      <a href="/login" class="btn btn-primary">Get Started</a>
      <button class="btn btn-secondary" onclick="alert('Health check: System is operational')">
        System Status
      </button>
    </div>
  </div>

  <footer>
    <p>Production-Grade Return Inspection Platform &copy; 2026</p>
  </footer>
</body>
</html>
